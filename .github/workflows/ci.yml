name: CI/CD

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-lint-

            - name: Check formatting
              run: cargo fmt --all --check

            - name: Clippy
              run: cargo clippy --all-targets -- -D warnings

    test:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:18
                env:
                    POSTGRES_USER: scry_test
                    POSTGRES_PASSWORD: scry_test
                    POSTGRES_DB: scry_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U scry_test"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            TEST_DATABASE_URL: postgresql://scry_test:scry_test@localhost:5432/scry_test?sslmode=disable
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-

            - name: Run tests
              run: cargo test -- --include-ignored

    # Version is computed from the squash-merged PR title (= head commit
    # subject): feat -> minor, ! -> major, anything else -> patch. Git tags
    # are the source of truth; Cargo.toml stays at its 0.0.0-dev placeholder.
    version:
        needs: [test, lint]
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        outputs:
            version: ${{ steps.next.outputs.version }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Compute next version from PR title
              id: next
              run: ./.github/scripts/next-version.sh >> "$GITHUB_OUTPUT"

    tag:
        needs: version
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Check if tag exists
              id: check
              run: |
                  if git ls-remote --tags origin "${{ needs.version.outputs.version }}" | grep -q .; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create release
              if: steps.check.outputs.exists == 'false'
              run: gh release create "${{ needs.version.outputs.version }}" --generate-notes --title "${{ needs.version.outputs.version }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: version
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        permissions:
            contents: read
            packages: write
        env:
            REGISTRY: ghcr.io
            IMAGE_NAME: ${{ github.repository }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  target: production
                  push: true
                  provenance: false
                  build-args: |
                      APP_VERSION=${{ needs.version.outputs.version }}
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

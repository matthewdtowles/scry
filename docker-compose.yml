services:
  etl:
    build:
      context: .
      target: development
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SCRY_LOG=${SCRY_LOG}
    env_file:
      - .env
    networks:
      - i-want-my-mtg
    restart: 'no'
    command: ['cargo', 'run', '--', 'ingest']

networks:
  i-want-my-mtg:
    external: true
    name: i-want-my-mtg_default
